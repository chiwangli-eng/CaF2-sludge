<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaF2 Precipitation Calculator</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for compiling JSX in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Custom styling for standardizing slider appearance */
        input[type=range] {
            accent-color: #4f46e5; /* Indigo-600 */
        }
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-100 via-indigo-50 to-purple-50 text-gray-800 antialiased min-h-screen p-4 md:p-8 flex items-center justify-center selection:bg-indigo-200">
    
    <div id="root" class="w-full max-w-6xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Moved InputGroup OUTSIDE the App component to prevent remounting and stuttering
        const InputGroup = ({ label, min, max, step, value, setValue, unit }) => (
            <div class="mb-6 group">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-sm font-bold text-gray-700 group-hover:text-indigo-600 transition-colors duration-300">{label}</label>
                    <div class="flex items-center space-x-2">
                        <input 
                            type="number" 
                            min={min} max={max} step={step} 
                            value={value} 
                            onChange={(e) => setValue(Number(e.target.value))}
                            class="w-24 text-right px-3 py-1.5 bg-white/50 border border-gray-200 rounded-lg shadow-inner focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm font-semibold text-indigo-900 transition-all outline-none"
                        />
                        <span class="text-xs text-gray-500 font-bold w-10 uppercase tracking-wider">{unit}</span>
                    </div>
                </div>
                <input 
                    type="range" 
                    min={min} max={max} step={step} 
                    value={value} 
                    onChange={(e) => setValue(Number(e.target.value))}
                    class="w-full h-2.5 bg-gray-200 rounded-lg appearance-none cursor-pointer shadow-inner transition-all group-hover:bg-indigo-100"
                />
                <div class="flex justify-between text-[10px] text-gray-400 mt-1.5 font-semibold">
                    <span>{min}</span>
                    <span>{max}</span>
                </div>
            </div>
        );

        function App() {
            // --- State for Inputs ---
            // Low Concentration HFD
            const [hfdF, setHfdF] = useState(300);
            const [hfdQ, setHfdQ] = useState(1000);
            
            // Cryolite System
            const [cryoF, setCryoF] = useState(100);
            const [cryoQ, setCryoQ] = useState(2000);
            
            // Reagents & Parameters
            const [caRatio, setCaRatio] = useState(1.0);
            const [waterContent, setWaterContent] = useState(55);

            // --- Computed Outputs ---
            const [results, setResults] = useState({
                qMix: 0,
                cMix: 0,
                wetSludge: 0,
                clConc: 0,
                caConc: 0,
                limiting: 'None'
            });

            // Recalculate whenever an input changes
            useEffect(() => {
                calculate();
            }, [hfdF, hfdQ, cryoF, cryoQ, caRatio, waterContent]);

            const calculate = () => {
                const ATOMIC_WEIGHT_F = 19.00;
                const ATOMIC_WEIGHT_CA = 40.08;
                const ATOMIC_WEIGHT_CL = 35.45;
                const MOLAR_MASS_CAF2 = ATOMIC_WEIGHT_CA + (2 * ATOMIC_WEIGHT_F);

                // 1. Mixing
                const qMix = hfdQ + cryoQ;
                const fMassKg = (hfdF * hfdQ + cryoF * cryoQ) / 1000.0;
                const cMix = (fMassKg * 1000.0) / qMix;

                // 2. Reaction logic
                const molesF = (fMassKg * 1000.0) / ATOMIC_WEIGHT_F;
                
                // Moles of Ca added based on user ratio
                const molesCaAdded = molesF * caRatio;
                
                const molesCaF2Formed = Math.min(molesCaAdded, molesF / 2.0);
                
                let limiting = 'F Limiting';
                if (caRatio < 0.5) limiting = 'Ca Limiting';
                if (Math.abs(caRatio - 0.5) < 0.01) limiting = 'Exact Stoichiometry';

                // 3. Sludge Weight
                const drySludgeKg = (molesCaF2Formed * MOLAR_MASS_CAF2) / 1000.0;
                const solidFraction = 1.0 - (waterContent / 100.0);
                const wetSludgeKg = drySludgeKg / solidFraction;

                // 4. Concentrations
                // Chloride
                const molesClAdded = 2.0 * molesCaAdded;
                const massClGrams = molesClAdded * ATOMIC_WEIGHT_CL;
                const clConc = massClGrams / qMix;

                // Residual Calcium
                const molesCaResidual = molesCaAdded - molesCaF2Formed;
                const massCaResidualGrams = molesCaResidual * ATOMIC_WEIGHT_CA;
                const caConc = massCaResidualGrams / qMix;

                setResults({
                    qMix: qMix.toFixed(0),
                    cMix: cMix.toFixed(2),
                    wetSludge: wetSludgeKg.toFixed(2),
                    clConc: clConc.toFixed(2),
                    caConc: caConc.toFixed(2),
                    limiting: limiting
                });
            };

            return (
                <div class="w-full mx-auto bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_20px_50px_rgba(8,_112,_184,_0.07)] overflow-hidden border border-white/40">
                    <div class="bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 p-8 text-white text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-full bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4xNSkiLz48L3N2Zz4=')] opacity-30"></div>
                        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight relative z-10 drop-shadow-md">CaF₂ Precipitation Calculator</h1>
                        <p class="text-indigo-100 text-base mt-3 font-medium relative z-10">Interactive estimation tool for chemical dosing and wastewater parameters</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-0">
                        {/* --- LEFT PANEL: INPUTS --- */}
                        <div class="col-span-1 lg:col-span-8 p-6 md:p-10 grid grid-cols-1 md:grid-cols-2 gap-8 relative">
                            
                            {/* Stream 1 */}
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100 hover:shadow-lg hover:border-blue-300 transition-all duration-300 group">
                                <h2 class="text-lg font-black text-slate-800 mb-6 flex items-center">
                                    <div class="bg-blue-100 text-blue-600 p-2 rounded-xl mr-3 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                                    </div>
                                    Low Conc. HFD
                                </h2>
                                <InputGroup label="Fluoride (F) Conc." min={100} max={600} step={1} value={hfdF} setValue={setHfdF} unit="mg/L" />
                                <InputGroup label="Flow Rate (Q)" min={500} max={2000} step={10} value={hfdQ} setValue={setHfdQ} unit="CMD" />
                            </div>

                            {/* Stream 2 */}
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-indigo-100 hover:shadow-lg hover:border-indigo-300 transition-all duration-300 group">
                                <h2 class="text-lg font-black text-slate-800 mb-6 flex items-center">
                                    <div class="bg-indigo-100 text-indigo-600 p-2 rounded-xl mr-3 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                                    </div>
                                    Cryolite Treated
                                </h2>
                                <InputGroup label="Fluoride (F) Conc." min={60} max={150} step={1} value={cryoF} setValue={setCryoF} unit="mg/L" />
                                <InputGroup label="Flow Rate (Q)" min={1000} max={3000} step={10} value={cryoQ} setValue={setCryoQ} unit="CMD" />
                            </div>

                            {/* Chemical Reagents */}
                            <div class="bg-gradient-to-br from-emerald-50 to-teal-50 p-6 rounded-2xl border border-emerald-200 shadow-sm md:col-span-2 hover:shadow-lg transition-all duration-300 group">
                                <h2 class="text-lg font-black text-emerald-900 mb-6 flex items-center">
                                    <div class="bg-emerald-200 text-emerald-700 p-2 rounded-xl mr-3 group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                                    </div>
                                    Chemical Reagent (CaCl₂) & Sludge Parameters
                                </h2>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-4">
                                    <InputGroup label="Ca/F Molar Ratio" min={0.5} max={2.5} step={0.1} value={caRatio} setValue={setCaRatio} unit="ratio" />
                                    <InputGroup label="Sludge Water Content" min={45} max={80} step={1} value={waterContent} setValue={setWaterContent} unit="%" />
                                </div>
                            </div>
                        </div>

                        {/* --- RIGHT PANEL: OUTPUTS --- */}
                        <div class="col-span-1 lg:col-span-4 bg-slate-900 bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 text-white p-8 md:p-10 flex flex-col justify-between relative shadow-[-10px_0_30px_rgba(0,0,0,0.1)]">
                            
                            {/* Decorative background blur */}
                            <div class="absolute top-20 right-10 w-32 h-32 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
                            <div class="absolute bottom-20 left-10 w-32 h-32 bg-emerald-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

                            <div class="relative z-10">
                                <h2 class="text-xs uppercase tracking-[0.2em] font-bold text-indigo-300 border-b border-indigo-500/30 pb-4 mb-8">
                                    Calculated Outputs
                                </h2>
                                
                                <div class="space-y-8">
                                    {/* Sludge (Hero Metric) */}
                                    <div class="bg-white/5 rounded-2xl p-5 border border-white/10 backdrop-blur-sm">
                                        <p class="text-indigo-200 text-sm font-bold mb-2">CaF₂ Wet Sludge Produced</p>
                                        <div class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br from-emerald-300 to-green-500 drop-shadow-sm">
                                            {results.wetSludge}
                                        </div>
                                        <div class="text-sm font-semibold text-emerald-400/80 mt-1 uppercase tracking-wide">kg/day</div>
                                    </div>

                                    <div class="grid grid-cols-2 gap-6">
                                        <div>
                                            <p class="text-slate-400 text-xs font-bold mb-1 uppercase tracking-wider">Mixed Flow</p>
                                            <div class="text-2xl font-bold text-white">
                                                {results.qMix} <span class="text-sm font-medium text-slate-500">CMD</span>
                                            </div>
                                        </div>

                                        <div>
                                            <p class="text-slate-400 text-xs font-bold mb-1 uppercase tracking-wider">Mixed F Conc.</p>
                                            <div class="text-2xl font-bold text-white">
                                                {results.cMix} <span class="text-sm font-medium text-slate-500">mg/L</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="space-y-5">
                                        <div class="flex items-end justify-between border-b border-slate-700/50 pb-3">
                                            <div>
                                                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Residual Cl⁻</p>
                                                <p class="text-[10px] text-slate-500 italic">Assuming CaCl₂ source</p>
                                            </div>
                                            <div class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-400 text-right">
                                                {results.clConc} <span class="text-sm text-yellow-500/70">mg/L</span>
                                            </div>
                                        </div>

                                        <div class="flex items-end justify-between border-b border-slate-700/50 pb-3">
                                            <div>
                                                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Residual Ca²⁺</p>
                                                <p class="text-[10px] text-slate-500 italic">Excess from overdosing</p>
                                            </div>
                                            <div class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-300 to-rose-400 text-right">
                                                {results.caConc} <span class="text-sm text-orange-500/70">mg/L</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-8 pt-6 relative z-10">
                                <div class="bg-black/20 rounded-xl p-4 border border-white/5">
                                    <div class="flex items-center justify-between text-sm mb-2">
                                        <span class="text-slate-300 font-medium">Limiting Factor</span>
                                        <span class={`font-black text-xs px-2.5 py-1 rounded-full tracking-wide uppercase shadow-inner ${results.limiting === 'F Limiting' ? 'bg-indigo-500/20 text-indigo-300 border border-indigo-500/30' : 'bg-rose-500/20 text-rose-300 border border-rose-500/30'}`}>
                                            {results.limiting}
                                        </span>
                                    </div>
                                    <p class="text-[10px] text-slate-500 leading-relaxed">
                                        Calculations based on exact stoichiometry. A Ca/F ratio &gt; 0.5 leaves Calcium in excess.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
